<!DOCTYPE html>
<html lang="pt_BR" ng-app="animeList">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime List</title>
    <!-- bibliotecas de Angular -->
    <script src="./lib/angular/angular.min.js"></script>
    <script src="./lib/angular-ui-router/angular-ui-router.min.js"></script>

    <!-- CSS BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS PERSONALIZADO -->
    <link rel="stylesheet" href="style.css">
    <!-- APP -->
    <script src="app.js"></script>

    <!-- Services -->
    <script src="services/animeService.js"></script>
    <script src="services/localStorageService.js"></script>

    <!-- Controllers -->
    <script src="controllers/conteudoController.js"></script>
    <script src="controllers/formController.js"></script>
    <script src="controllers/favoritosController.js"></script>


</head>

<body>
    <!-- Menu -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary bg-orange">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" ui-sref="listAnime">Top Animes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" ui-sref="listManga">Top Mangas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" ui-sref="busca">Buscar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" ui-sref="favoritos">Favoritos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div ui-view></div>
    </div>

    <!-- JS BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
